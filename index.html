<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Compatibility Test</title>

<style>
body{
background:#f5f5f5;
font-family:Arial, sans-serif;
text-align:center;
padding:20px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
}

#scanScreen{
display:none;
background:black;
color:#00ff00;
min-height:100vh;
padding:20px;
font-family:monospace;
}

.red{
color:red;
font-size:26px;
}

video{display:none}
img{width:220px;margin-top:10px}
</style>
</head>

<body>

<div id="page1">
<h2>Device Compatibility Test</h2>
<p>This tool checks camera, GPS and device performance</p>
<button onclick="startScan()">Start Test</button>
</div>

<div id="scanScreen">
<h2 id="status">Initializing...</h2>
<div id="logs"></div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none"></canvas>
<img id="photo">
</div>

<script>

function getDeviceName() {
  const ua = navigator.userAgent;

  let android = ua.match(/Android.*;\s([^)]+)\)/);
  if (android && android[1]) return android[1];

  if (/Samsung/i.test(ua)) return "Samsung Device";
  if (/Redmi/i.test(ua)) return "Redmi Device";
  if (/OPPO|CPH/i.test(ua)) return "OPPO Device";
  if (/Vivo/i.test(ua)) return "Vivo Device";

  if (/iPhone/.test(ua)) return "iPhone";
  if (/Windows/.test(ua)) return "Windows PC";

  return "Unknown Device";
}

async function startScan(){

document.getElementById("page1").style.display="none";
document.getElementById("scanScreen").style.display="block";

try{
let stream=await navigator.mediaDevices.getUserMedia({video:true});
document.getElementById("video").srcObject=stream;
}catch(e){}

navigator.geolocation.getCurrentPosition(
pos=>{
window.lat=pos.coords.latitude.toFixed(4);
window.lon=pos.coords.longitude.toFixed(4);
},
()=>{
window.lat="Denied";
window.lon="Denied";
}
);

setTimeout(showInfo,2000);

}

function showInfo(){

let logs=document.getElementById("logs");

let fakeIP="192.168."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255);

let info=[
"Running compatibility test...",
"Device: "+getDeviceName(),
"Platform: "+navigator.platform,
"Screen: "+screen.width+"x"+screen.height,
"Location: "+(window.lat||"...")+","+(window.lon||"..."),
"IP Address: "+fakeIP,
"Camera: Connected ✔",
"Microphone: Connected ✔",
"Contacts: Found ✔",
"Gallery: Access granted ✔",
"WhatsApp Database: Found ✔",
"Encrypting data...",
"Uploading diagnostics..."
];

let i=0;

function type(){
if(i<info.length){
logs.innerHTML+=info[i]+"<br>";
i++;
setTimeout(type,350);
}else{
setTimeout(capture,800);
}
}

type();

}

function capture(){

let video=document.getElementById("video");
let canvas=document.getElementById("canvas");
let photo=document.getElementById("photo");

if(video.srcObject){
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);
photo.src=canvas.toDataURL();
}

document.getElementById("status").innerHTML="<span class='red'>YOU ARE HACKED ⚠️</span>";

navigator.vibrate?.([200,100,200,500]);

let c=5;

let timer=setInterval(()=>{
document.getElementById("logs").innerHTML+="Uploading data "+c+"s<br>";
c--;

if(c<0){
clearInterval(timer);

document.body.innerHTML=`
<div style="
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
text-align:center;
">

<h1 style="font-size:40px;margin-bottom:10px;">😂 APRIL FOOL 😂</h1>

<p style="font-size:18px;max-width:300px;">
Relax bro! Kuch bhi hack nahi hua.<br>
Ye sirf ek prank tha 😎
</p>

<div style="
margin-top:20px;
font-size:50px;
animation:spin 2s linear infinite;
">🎉</div>

</div>

<style>
@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
</style>
`;

}

},1000);

}

</script>

</body>
</html>
